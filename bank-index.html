<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>振込名義変換ツール｜銀行振込用カナ変換（30文字対応）</title>

<meta name="description" content="銀行振込名義を自動変換。株式会社略語、半角カナ、小文字カナ変換、30文字制限に対応。無料ツール。">

<style>

body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:20px;
line-height:1.6;
}

textarea{
width:100%;
height:80px;
font-size:18px;
padding:10px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

#output{
background:#f5f5f5;
}

.counter{
font-size:14px;
color:#666;
}

section{
margin-top:50px;
}

table{
border-collapse:collapse;
width:100%;
}

td,th{
border:1px solid #ddd;
padding:8px;
}

</style>

</head>

<body>

<h1>振込名義変換ツール</h1>

<p>
会社名を銀行振込用の半角カナ名義に変換します。
</p>

<textarea id="input" placeholder="例：株式会社キャッシュフロー＆パートナーズ"></textarea>

<h3>変換結果</h3>

<textarea id="output" readonly></textarea>

<div class="counter">
文字数: <span id="count">0</span> / 30
</div>

<button onclick="copy()">コピー</button>

<script>

document.getElementById("input").addEventListener("input",convert)

function convert(){

let text=document.getElementById("input").value

text=text.toUpperCase()

text=text.replace(/[Ａ-Ｚａ-ｚ０-９]/g,function(s){
return String.fromCharCode(s.charCodeAt(0)-0xFEE0)
})

const corp=[
["株式会社","(ｶ)"],
["有限会社","(ﾕ)"],
["合同会社","(ﾄﾞ)"],
["医療法人","(ｲ)"],
["社会福祉法人","(ﾌｸ)"],
["学校法人","(ｶﾞｸ)"],
["宗教法人","(ｼﾕ)"],
["一般社団法人","(ｼﾔ)"],
["一般財団法人","(ｻﾞｲ)"]
]

corp.forEach(function(rule){

text=text.replace("^"+rule[0],rule[1])
text=text.replace(rule[0]+"$",rule[1])

})

const smallKana={
"ャ":"ヤ","ュ":"ユ","ョ":"ヨ",
"ァ":"ア","ィ":"イ","ゥ":"ウ",
"ェ":"エ","ォ":"オ","ッ":"ツ"
}

Object.keys(smallKana).forEach(function(k){

text=text.replaceAll(k,smallKana[k])

})

text=text.replace(/＆/g,"ｱﾝﾄﾞ")
text=text.replace(/&/g,"ｱﾝﾄﾞ")
text=text.replace(/・/g,"･")
text=text.replace(/ー/g,"ｰ")

text=text.replace(/[ァ-ン]/g,function(s){
return String.fromCharCode(s.charCodeAt(0)-0x60)
})

text=text.replace(/[^A-Z0-9ｦ-ﾟ()･ｰ]/g,"")

let result=text.substring(0,30)

document.getElementById("output").value=result
document.getElementById("count").innerText=result.length

}

function copy(){

let output=document.getElementById("output")
output.select()
document.execCommand("copy")

}

</script>

<section>

<h2>銀行振込名義のルール</h2>

<ul>
<li>振込名義は最大30文字</li>
<li>半角カナを使用</li>
<li>株式会社は(ｶ)と略す</li>
<li>小文字カナは大文字に変換</li>
</ul>

</section>

<section>

<h2>法人略語一覧</h2>

<table>

<tr>
<th>正式名称</th>
<th>振込名義</th>
</tr>

<tr>
<td>株式会社</td>
<td>(ｶ)</td>
</tr>

<tr>
<td>有限会社</td>
<td>(ﾕ)</td>
</tr>

<tr>
<td>合同会社</td>
<td>(ﾄﾞ)</td>
</tr>

<tr>
<td>医療法人</td>
<td>(ｲ)</td>
</tr>

<tr>
<td>社会福祉法人</td>
<td>(ﾌｸ)</td>
</tr>

</table>

</section>

<section>

<h2>振込名義の例</h2>

<table>

<tr>
<th>会社名</th>
<th>振込名義</th>
</tr>

<tr>

</tr>

<tr>
<td>山田商事株式会社</td>
<td>ﾔﾏﾀﾞｼﾖｳｼﾞ(ｶ)</td>
</tr>

<tr>
<td>合同会社テック</td>
<td>ﾃﾂｸ(ﾄﾞ)</td>
</tr>

</table>

</section>

</body>
</html>
